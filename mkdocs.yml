site_name: saritasa-invocations
site_description: Collection of invoke commands used by Saritasa
site_url: https://saritasa-nest.github.io/saritasa-invocations/
repo_url: https://github.com/saritasa-nest/saritasa-invocations/
repo_name: saritasa-invocations
theme:
  name: material
  favicon: _static/favicon.png
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      primary: custom
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - search.suggest
    - search.highlight
    - search.share
    - navigation.instant
    - navigation.instant.progress
    - navigation.tracking
    - navigation.path
    - content.code.annotate
    - content.code.copy
    - content.tooltips
extra_css:
  - _static/custom_color.css
plugins:
  - search
  - autorefs
  - mkdocstrings
markdown_extensions:
  - admonition
  - attr_list
  - pymdownx.highlight:
      use_pygments: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.emoji
  - pymdownx.magiclink
  - toc:
      permalink: true
nav:
  - Home: index.md
  - Changelog: changelog.md
  - Contributing: contributing.md
  - Reference:
      - alembic: "reference/alembic.md"
      - celery: "reference/celery.md"
      - config: "reference/config.md"
      - cruft: "reference/cruft.md"
      - db: "reference/db.md"
      - db_k8s: "reference/db_k8s.md"
      - django: "reference/django.md"
      - docker: "reference/docker.md"
      - fastapi: "reference/fastapi.md"
      - git: "reference/git.md"
      - github_actions: "reference/github_actions.md"
      - k8s: "reference/k8s.md"
      - mypy: "reference/mypy.md"
      - open_api: "reference/open_api.md"
      - pip: "reference/pip.md"
      - poetry: "reference/poetry.md"
      - pre_commit: "reference/pre_commit.md"
      - printing: "reference/printing.md"
      - pytest: "reference/pytest.md"
      - python: "reference/python.md"
      - secrets: "reference/secrets.md"
      - system: "reference/system.md"
      - uv: "reference/uv.md"
extra:
  version:
    provider: mike
